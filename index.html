<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <script>
      window.__SPLASH_START__ = Date.now();
      if (sessionStorage.getItem('qryptum_splash_done') === '1') {
        window.__SPLASH_SKIP__ = true;
      }
    </script>

    <title>The Security Layer Beyond Your Private Key</title>
    <meta name="description" content="The Security Layer Beyond Your Private Key. Quantum-Resistant, Private, and No Internet Required." />
    <meta name="theme-color" content="#08090F" />

    <link rel="icon" type="image/png" sizes="64x64" href="%BASE_URL%favicon-tight.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon-tight.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Security Layer Beyond Your Private Key" />
    <meta property="og:description" content="The Security Layer Beyond Your Private Key. Quantum-Resistant, Private, and No Internet Required." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Security Layer Beyond Your Private Key" />
    <meta name="twitter:description" content="The Security Layer Beyond Your Private Key. Quantum-Resistant, Private, and No Internet Required." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100;0,14..32,200;0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #000; }

      #splash-html {
        position: fixed; inset: 0; z-index: 9999;
        background: #000;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash-html.fading { opacity: 0; pointer-events: none; }

      #splash-ring {
        position: relative;
        width: 108px; height: 108px;
        display: flex; align-items: center; justify-content: center;
      }
      #splash-ring svg {
        position: absolute; inset: 0;
        animation: splash-spin 1.1s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #splash-ring svg { animation: none; }
      }
    </style>
  </head>
  <body style="background:#000">
    <div id="root"></div>

    <div id="splash-html">
      <div id="splash-ring">
        <svg viewBox="0 0 108 108" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="54" cy="54" r="50" stroke="rgba(255,255,255,0.08)" stroke-width="2.5"/>
          <path d="M54 4 A50 50 0 0 1 104 54" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <img src="%BASE_URL%qryptum-logo.png" width="46" height="46" alt="Qryptum"
             style="display:block;position:relative;z-index:1;" />
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
