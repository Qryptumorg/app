name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout qryptair repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/qryptair
          path: _qryptair

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── 1. BUILD LANDING ─────────────────────────────────────────────
      # Output: landing/dist/public/
      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --no-frozen-lockfile

      - name: Build landing (base = /app/)
        working-directory: landing
        env:
          NODE_ENV: production
          BASE_PATH: /app/
        run: pnpm run build

      # ── 2. BUILD SHIELD ──────────────────────────────────────────────
      # Output: dist/public/ (repo root)
      - name: Install shield-app dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ShieldTransfer (base = /app/app/)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/app/
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      # ── 3. BUILD QRYPTAIR ────────────────────────────────────────────
      # Output: _qryptair/dist/ or _qryptair/dist/public/
      - name: Install qryptair dependencies
        working-directory: _qryptair
        run: pnpm install --no-frozen-lockfile

      - name: Build QryptAir (base = /app/qryptair/)
        working-directory: _qryptair
        env:
          NODE_ENV: production
          PORT: '3001'
          BASE_PATH: /app/qryptair/
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      # ── 4. ASSEMBLE FINAL PAGES DIRECTORY ───────────────────────────
      # _pages/            = landing  (served at /app/)
      # _pages/app/        = shield   (served at /app/app/)
      # _pages/qryptair/   = qryptair (served at /app/qryptair/)
      - name: Assemble pages output
        run: |
          mkdir -p _pages/app _pages/qryptair

          # Shield -> _pages/app/
          cp -r dist/public/. _pages/app/

          # QryptAir -> _pages/qryptair/
          # Support either dist/public/ or dist/ as outdir
          if [ -d "_qryptair/dist/public" ]; then
            cp -r _qryptair/dist/public/. _pages/qryptair/
          else
            cp -r _qryptair/dist/. _pages/qryptair/
          fi

          # Landing -> _pages/ (must be LAST to avoid being overwritten)
          cp -r landing/dist/public/. _pages/

          # SPA 404 fallback
          cp _pages/index.html _pages/404.html

          echo "=== Final structure ==="
          find _pages -maxdepth 2 -type d
          du -sh _pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
