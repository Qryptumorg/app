name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout qryptair repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/qryptair
          path: _qryptair

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 1. Build landing -> dist/public/ (root of GitHub Pages = /app/)
      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --no-frozen-lockfile

      - name: Build landing (base = /app/)
        working-directory: landing
        env:
          NODE_ENV: production
          BASE_PATH: /app/
        run: pnpm run build

      - name: Move landing build to dist/public/
        run: |
          mkdir -p dist/public
          cp -r landing/dist/. dist/public/

      # 2. Build ShieldTransfer -> dist/public/app/
      - name: Install shield-app dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ShieldTransfer (base = /app/app/)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/app/
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      - name: Move shield build to dist/public/app/
        run: |
          mkdir -p dist/public/app
          cp -r dist/public/. dist/public/app/ 2>/dev/null || true
          rm -rf dist/public/app/app

      # 3. Build QryptAir -> dist/public/qryptair/
      - name: Install qryptair dependencies
        working-directory: _qryptair
        run: pnpm install --no-frozen-lockfile

      - name: Build QryptAir (base = /app/qryptair/)
        working-directory: _qryptair
        env:
          NODE_ENV: production
          PORT: '3001'
          BASE_PATH: /app/qryptair/
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      - name: Move qryptair build to dist/public/qryptair/
        run: |
          mkdir -p dist/public/qryptair
          cp -r _qryptair/dist/. dist/public/qryptair/

      - name: Add 404.html fallback (SPA routing)
        run: cp dist/public/index.html dist/public/404.html

      - name: Show build structure
        run: |
          echo "=== Pages structure ==="
          find dist/public -maxdepth 2 -type d
          du -sh dist/public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
