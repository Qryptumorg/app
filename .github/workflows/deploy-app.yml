name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── 1. BUILD LANDING ─────────────────────────────────────────────
      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --no-frozen-lockfile

      - name: Build landing (base = /app/)
        working-directory: landing
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/
        run: pnpm run build

      # ── 2. BUILD SHIELD ──────────────────────────────────────────────
      - name: Install shield-app dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ShieldTransfer (base = /app/app/)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/app/
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      # ── 3. BUILD HACK (minimal standalone, no WalletConnect) ─────────
      - name: Build Hack (base /hack/)
        env:
          NODE_ENV: production
          BASE_PATH: /hack/
        run: pnpm run build:hack


      # ── 4. ASSEMBLE PAGES ────────────────────────────────────────────
      # _pages/            = landing  -> /app/
      # _pages/app/        = shield   -> /app/app/
      # _pages/qryptair/   = redirect -> qryptumorg.github.io/qryptair/
      - name: Assemble pages output
        run: |
          set -euo pipefail
          mkdir -p _pages/app _pages/qryptair

          # Shield -> _pages/app/
          cp -r dist/public/. _pages/app/

          # Hack -> _pages/hack/
          mkdir -p _pages/hack
          cp -r dist/hack/. _pages/hack/

          # QryptAir: redirect to its own standalone GitHub Pages deployment
          cat > _pages/qryptair/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>QryptAir – Redirecting...</title>
            <meta http-equiv="refresh" content="0; url=https://qryptumorg.github.io/qryptair/">
            <link rel="canonical" href="https://qryptumorg.github.io/qryptair/">
          </head>
          <body>
            <script>window.location.replace("https://qryptumorg.github.io/qryptair/");</script>
          </body>
          </html>
          EOF

          # Landing -> _pages/ (LAST so it's not overwritten)
          if [ -d "landing/dist/public" ]; then
            cp -r landing/dist/public/. _pages/
          else
            cp -r landing/dist/. _pages/
          fi

          # SPA 404 fallback
          cp _pages/index.html _pages/404.html

          echo "=== Final structure ==="
          find _pages -maxdepth 2 -type d
          du -sh _pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
