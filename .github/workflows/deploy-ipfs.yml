name: Deploy to IPFS (eth.limo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 30

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout qryptair repo
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/qryptair
          path: _qryptair
          token: ${{ secrets.QRYPTAIR_REPO_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 1. Build landing -> dist/
      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --no-frozen-lockfile

      - name: Build landing (base = /)
        working-directory: landing
        env:
          NODE_ENV: production
          BASE_PATH: /
        run: pnpm run build

      - name: Move landing build to combined dist/
        run: |
          mkdir -p dist
          cp -r landing/dist/. dist/

      # 2. Build ShieldTransfer -> dist/app/
      - name: Install shield-app dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ShieldTransfer (base = /app/)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      - name: Move shield build to dist/app/
        run: |
          mkdir -p dist/app
          cp -r dist/public/. dist/app/
          rm -rf dist/public

      # 3. Build QryptAir -> dist/qryptair/
      - name: Install qryptair dependencies
        working-directory: _qryptair
        run: pnpm install --no-frozen-lockfile

      - name: Build QryptAir (base = /qryptair/)
        working-directory: _qryptair
        env:
          NODE_ENV: production
          PORT: '3001'
          BASE_PATH: /qryptair/
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      - name: Move qryptair build to dist/qryptair/
        run: |
          mkdir -p dist/qryptair
          cp -r _qryptair/dist/. dist/qryptair/

      - name: Show combined build structure
        run: |
          echo "=== Combined dist/ ==="
          find dist -maxdepth 2 -type d
          du -sh dist

      # 4. Upload combined dist/ to Pinata
      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: node .github/scripts/pinata-upload.mjs
