name: Deploy to IPFS (eth.limo)

on:
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 40

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout qryptair repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/qryptair
          path: _qryptair

      - name: Checkout docs repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/docs
          path: _docs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── 1. BUILD LANDING ─────────────────────────────────────────────
      # base = /  →  qryptum.eth.limo/
      # outDir = landing/dist/public/
      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --no-frozen-lockfile

      - name: Build landing (base = /)
        working-directory: landing
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /
        run: pnpm run build

      # ── 2. BUILD SHIELD ──────────────────────────────────────────────
      # base = /app/  →  qryptum.eth.limo/app/
      # outDir = dist/public/  (repo root)
      - name: Install shield-app dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ShieldTransfer (base = /app/)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      # ── 3. BUILD QRYPTAIR ────────────────────────────────────────────
      # base = /qryptair/ (hardcoded in repo) →  qryptum.eth.limo/qryptair/
      # outDir = _qryptair/dist/
      - name: Install qryptair dependencies
        working-directory: _qryptair
        run: pnpm install --no-frozen-lockfile

      - name: Build QryptAir (base /qryptair/ hardcoded)
        working-directory: _qryptair
        env:
          NODE_ENV: production
        run: pnpm run build

      # ── 4. BUILD DOCS ────────────────────────────────────────────────
      # base = /docs/ (hardcoded as default in vite.config) →  qryptum.eth.limo/docs/
      # outDir = _docs/dist/public/
      - name: Install docs dependencies
        working-directory: _docs
        run: pnpm install --no-frozen-lockfile

      - name: Build Docs (base /docs/ default)
        working-directory: _docs
        env:
          NODE_ENV: production
        run: pnpm run build

      # ── 5. ASSEMBLE dist/ ────────────────────────────────────────────
      # Final layout:
      #   dist/            = landing  (qryptum.eth.limo/)
      #   dist/app/        = shield   (qryptum.eth.limo/app/)
      #   dist/qryptair/   = qryptair (qryptum.eth.limo/qryptair/)
      #   dist/docs/       = docs     (qryptum.eth.limo/docs/)
      - name: Assemble combined dist/
        run: |
          set -euo pipefail

          # Shield is already at dist/public/ — move to dist/app/
          mkdir -p dist/app
          cp -r dist/public/. dist/app/
          rm -rf dist/public

          # QryptAir — copy to dist/qryptair/
          mkdir -p dist/qryptair
          cp -r _qryptair/dist/. dist/qryptair/

          # Docs — copy to dist/docs/
          mkdir -p dist/docs
          cp -r _docs/dist/public/. dist/docs/

          # Landing — copy to dist/ ROOT last (avoids being overwritten)
          if [ -d "landing/dist/public" ]; then
            cp -r landing/dist/public/. dist/
          else
            cp -r landing/dist/. dist/
          fi

          echo "=== Combined dist/ ==="
          find dist -maxdepth 2 -type d
          du -sh dist

      # ── 6. UPLOAD TO PINATA ──────────────────────────────────────────
      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: node .github/scripts/pinata-upload.mjs
