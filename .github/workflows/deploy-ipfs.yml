name: Deploy to IPFS (eth.limo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for IPFS (base path = /)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: '/'
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
          VITE_PROOF_SALT: ${{ secrets.VITE_PROOF_SALT }}
          VITE_SHIELD_FACTORY_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_SEPOLIA }}
          VITE_SHIELD_FACTORY_V6_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_V6_SEPOLIA }}
        run: |
          pnpm run build
          echo "=== Build size (excl .map) ==="
          du -sh dist/public

      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cat > /tmp/pinata-upload.mjs << 'NODEEOF'
          import fs from 'fs';
          import path from 'path';

          function getFiles(dir, base) {
            if (!base) base = dir;
            const out = [];
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name);
              if (e.isDirectory()) out.push(...getFiles(full, base));
              else {
                const rel = path.relative(base, full);
                if (!rel.endsWith('.map')) out.push({ full, rel });
              }
            }
            return out;
          }

          const jwt = process.env.PINATA_JWT;
          const sha = (process.env.COMMIT_SHA || 'unknown').slice(0, 7);
          const folder = 'qryptum-app-' + sha;
          const entries = getFiles('./dist/public');

          let totalBytes = 0;
          const data = new FormData();

          for (const { full, rel } of entries) {
            const bytes = fs.readFileSync(full);
            totalBytes += bytes.length;
            const filePath = folder + '/' + rel;
            data.append('file', new File([bytes], filePath), filePath);
          }

          data.append('pinataMetadata', JSON.stringify({ name: folder }));
          data.append('pinataOptions', JSON.stringify({ cidVersion: 1 }));

          console.log('Files  :', entries.length, '(source maps excluded)');
          console.log('Size   :', (totalBytes / 1024 / 1024).toFixed(2), 'MB');
          console.log('Uploading to Pinata...');

          const res = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + jwt, Source: 'sdk/fileArray' },
            body: data,
          });

          const text = await res.text();
          console.log('HTTP   :', res.status);

          let result;
          try { result = JSON.parse(text); }
          catch { console.error('Bad response:', text.slice(0, 500)); process.exit(1); }

          if (!result.IpfsHash) {
            console.error('Pinata error:', JSON.stringify(result));
            process.exit(1);
          }

          const cid = result.IpfsHash;

          console.log('');
          console.log('===== IPFS Upload Success =====');
          console.log('CID    :', cid);
          console.log('URL    : https://' + cid + '.ipfs.cf-ipfs.com/');
          console.log('');
          console.log('Set ENS contenthash on qryptum.eth:');
          console.log('  1. https://app.ens.domains/qryptum.eth');
          console.log('  2. Edit Records -> Content Hash');
          console.log('  3. Enter: ipfs://' + cid);
          console.log('  4. Save (ETH gas required)');
          console.log('');
          console.log('After update: https://qryptum.eth.limo -> app');
          console.log('===============================');

          const summary = [
            '## IPFS Deploy',
            '',
            '| | |',
            '|---|---|',
            '| **CID** | `' + cid + '` |',
            '| **Commit** | ' + sha + ' |',
            '| **IPFS URL** | ipfs://' + cid + '/ |',
            '| **Gateway** | https://' + cid + '.ipfs.cf-ipfs.com/ |',
            '',
            '### Set contenthash on qryptum.eth',
            '1. https://app.ens.domains/qryptum.eth',
            '2. Edit Records -> Content Hash',
            '3. Enter: `ipfs://' + cid + '`',
            '4. Save (gas required on Ethereum mainnet)',
            '',
            'After ENS update: **https://qryptum.eth.limo** will serve this build.',
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          NODEEOF

          node /tmp/pinata-upload.mjs
