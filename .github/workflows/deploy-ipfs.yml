name: Deploy to IPFS (eth.limo)
# triggered: 2026-04-20T02:42:23.300Z

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 50

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout qryptair repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/qryptair
          path: _qryptair

      - name: Checkout docs repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/docs
          path: _docs

      - name: Checkout site repo (public)
        uses: actions/checkout@v4
        with:
          repository: Qryptumorg/site
          path: _site

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # -- 1. BUILD LANDING -------------------------------------------------
      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --no-frozen-lockfile

      - name: Build landing (base = /)
        working-directory: landing
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /
        run: pnpm run build

      # -- 2. BUILD SHIELD --------------------------------------------------
      - name: Install shield-app dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build ShieldTransfer (base = /app/)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: /app/
          VITE_DEPLOY_TARGET: app
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
        run: pnpm run build

      # -- 3. BUILD HACK (minimal standalone) ----------------------------
      - name: Build Hack (base /hack/)
        env:
          NODE_ENV: production
          BASE_PATH: /hack/
        run: pnpm run build:hack

      # -- 4. BUILD QRYPTAIR ------------------------------------------------
      - name: Install qryptair dependencies
        working-directory: _qryptair
        run: pnpm install --no-frozen-lockfile

      - name: Build QryptAir (base /qryptair/ hardcoded)
        working-directory: _qryptair
        env:
          NODE_ENV: production
        run: pnpm run build

      # -- 5. BUILD DOCS ----------------------------------------------------
      - name: Install docs dependencies
        working-directory: _docs
        run: pnpm install --no-frozen-lockfile

      - name: Build Docs (base /docs/)
        working-directory: _docs
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: https://secdocs.replit.app
        run: pnpm run build

      # -- 6. BUILD SITE ----------------------------------------------------
      - name: Install site dependencies
        working-directory: _site
        run: pnpm install --no-frozen-lockfile

      - name: Build Site (base = /site/)
        working-directory: _site
        env:
          NODE_ENV: production
          BASE_PATH: /site/
        run: pnpm run build

      # -- 7. ASSEMBLE dist/ ------------------------------------------------
      # dist/           = landing  (qryptum.eth.limo/)
      # dist/app/       = shield   (qryptum.eth.limo/app/)
      # dist/qryptair/  = qryptair (qryptum.eth.limo/qryptair/)
      # dist/docs/      = docs     (qryptum.eth.limo/docs/)
      # dist/site/      = site     (qryptum.eth.limo/site/)
      # dist/hack/      = hack     (qryptum.eth.limo/hack/)
      - name: Assemble combined dist/
        run: |
          set -euo pipefail

          mkdir -p dist/app
          cp -r dist/public/. dist/app/
          rm -rf dist/public

          mkdir -p dist/qryptair
          cp -r _qryptair/dist/. dist/qryptair/

          mkdir -p dist/docs
          cp -r _docs/dist/public/. dist/docs/

          mkdir -p dist/site
          cp -r _site/dist/. dist/site/

          if [ -d "landing/dist/public" ]; then
            cp -r landing/dist/public/. dist/
          else
            cp -r landing/dist/. dist/
          fi

          # Rename hack entry (vite outputs index-hack.html, IPFS needs index.html)
          if [ -f "dist/hack/index-hack.html" ]; then
            mv dist/hack/index-hack.html dist/hack/index.html
          fi

          echo "=== Combined dist/ ==="
          find dist -maxdepth 2 -type d
          du -sh dist

      # -- 8. UPLOAD TO PINATA + UPDATE ENS ---------------------------------
      # ethers is already available from shield-app pnpm install above
      - name: Upload to Pinata IPFS and update ENS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
          ENS_PRIVATE_KEY: ${{ secrets.ENS_PRIVATE_KEY }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          NODE_PATH: ${{ github.workspace }}/node_modules
        run: node .github/scripts/pinata-upload.mjs
