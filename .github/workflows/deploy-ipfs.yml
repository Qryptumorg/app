name: Deploy to IPFS (eth.limo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for IPFS (base path = /)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: '/'
          VITE_PROOF_SALT: ${{ secrets.VITE_PROOF_SALT }}
          VITE_SHIELD_FACTORY_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_SEPOLIA }}
          VITE_SHIELD_FACTORY_V6_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_V6_SEPOLIA }}
        run: pnpm run build

      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          npm install @pinata/sdk --no-save --silent

          cat > /tmp/pinata-upload.cjs << 'NODEEOF'
          const pinataSDK = require('@pinata/sdk');
          const path = require('path');
          const fs = require('fs');

          async function main() {
            const pinata = new pinataSDK({ pinataJWTKey: process.env.PINATA_JWT });
            const sha = (process.env.COMMIT_SHA || 'unknown').slice(0, 7);
            const distPath = path.resolve('./dist/public');

            console.log('Uploading', distPath, '...');
            const result = await pinata.pinFromFS(distPath, {
              pinataMetadata: { name: 'qryptum-app-' + sha },
              pinataOptions: { wrapWithDirectory: false },
            });

            const cid = result.IpfsHash;
            console.log('');
            console.log('===== IPFS Upload Success =====');
            console.log('CID    :', cid);
            console.log('URL    :', 'https://' + cid + '.ipfs.cf-ipfs.com');
            console.log('Pinata :', 'https://gateway.pinata.cloud/ipfs/' + cid);
            console.log('');
            console.log('To update ENS contenthash on qryptum.eth:');
            console.log('  1. https://app.ens.domains/qryptum.eth');
            console.log('  2. Edit Records -> Content Hash');
            console.log('  3. Enter: ipfs://' + cid);
            console.log('  4. Save (requires ETH gas on mainnet)');
            console.log('===============================');

            const summary = [
              '## IPFS Deploy',
              '',
              '| | |',
              '|---|---|',
              '| **CID** | `' + cid + '` |',
              '| **Commit** | ' + sha + ' |',
              '| **CF Gateway** | https://' + cid + '.ipfs.cf-ipfs.com |',
              '| **Pinata Gateway** | https://gateway.pinata.cloud/ipfs/' + cid + ' |',
              '',
              '### Update ENS contenthash',
              '1. Go to **https://app.ens.domains/qryptum.eth**',
              '2. Click **Edit Records** -> **Content Hash**',
              '3. Enter: `ipfs://' + cid + '`',
              '4. Save (requires gas on Ethereum mainnet)',
              '',
              'After update: **https://qryptum.eth.limo** will serve this build.',
            ].join('\n');

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          }

          main().catch(function(err) {
            console.error('Upload failed:', err.message);
            process.exit(1);
          });
          NODEEOF

          node /tmp/pinata-upload.cjs
