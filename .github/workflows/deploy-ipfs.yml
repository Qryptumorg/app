name: Deploy to IPFS (eth.limo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for IPFS (base path = /)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: '/'
          VITE_PROOF_SALT: ${{ secrets.VITE_PROOF_SALT }}
          VITE_SHIELD_FACTORY_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_SEPOLIA }}
          VITE_SHIELD_FACTORY_V6_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_V6_SEPOLIA }}
        run: |
          pnpm run build
          echo "=== Build size (excl .map) ==="
          du -sh --exclude='*.map' dist/public

      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Install form-data to isolated /tmp dir — avoids pnpm workspace conflict
          mkdir -p /tmp/fd-pkg
          cd /tmp/fd-pkg && npm init -y --quiet && npm install form-data 2>&1 | tail -3
          cd "$GITHUB_WORKSPACE"

          cat > /tmp/pinata-upload.cjs << 'NODEEOF'
          const FormData = require('/tmp/fd-pkg/node_modules/form-data');
          const fs = require('fs');
          const path = require('path');
          const https = require('https');

          function getFiles(dir, base) {
            if (!base) base = dir;
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push.apply(results, getFiles(full, base));
              } else {
                const rel = path.relative(base, full);
                if (!rel.endsWith('.map')) results.push({ full: full, rel: rel });
              }
            }
            return results;
          }

          var files = getFiles('./dist/public');
          var jwt = process.env.PINATA_JWT;
          var sha = (process.env.COMMIT_SHA || 'unknown').slice(0, 7);

          var form = new FormData();
          var totalBytes = 0;

          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            totalBytes += fs.statSync(f.full).size;
            // Pinata docs: use filepath option (not filename) for directory structure
            form.append('file', fs.createReadStream(f.full), {
              filepath: f.rel,
            });
          }

          form.append('pinataMetadata', JSON.stringify({ name: 'qryptum-app-' + sha }));
          form.append('pinataOptions', JSON.stringify({ wrapWithDirectory: true }));

          console.log('Files  :', files.length, '(source maps excluded)');
          console.log('Size   :', (totalBytes / 1024 / 1024).toFixed(2), 'MB');
          console.log('Uploading to Pinata...');

          var headers = form.getHeaders();
          headers['Authorization'] = 'Bearer ' + jwt;

          var request = https.request({
            method: 'POST',
            hostname: 'api.pinata.cloud',
            path: '/pinning/pinFileToIPFS',
            headers: headers,
            timeout: 600000,
          }, function(res) {
            var data = '';
            res.on('data', function(chunk) { data += chunk; });
            res.on('end', function() {
              console.log('HTTP   :', res.statusCode);
              var result;
              try { result = JSON.parse(data); } catch(e) { console.error('Bad response:', data.slice(0,500)); process.exit(1); }

              if (!result.IpfsHash) {
                console.error('Pinata error:', JSON.stringify(result));
                process.exit(1);
              }

              var cid = result.IpfsHash;
              console.log('');
              console.log('===== IPFS Upload Success =====');
              console.log('CID    :', cid);
              console.log('URL    : https://' + cid + '.ipfs.cf-ipfs.com');
              console.log('Pinata : https://gateway.pinata.cloud/ipfs/' + cid);
              console.log('');
              console.log('Set ENS contenthash on qryptum.eth:');
              console.log('  1. https://app.ens.domains/qryptum.eth');
              console.log('  2. Edit Records -> Content Hash');
              console.log('  3. Enter: ipfs://' + cid);
              console.log('  4. Save (ETH gas required)');
              console.log('===============================');

              var summary = [
                '## IPFS Deploy',
                '',
                '| | |',
                '|---|---|',
                '| **CID** | `' + cid + '` |',
                '| **Commit** | ' + sha + ' |',
                '| **CF Gateway** | https://' + cid + '.ipfs.cf-ipfs.com |',
                '| **Pinata Gateway** | https://gateway.pinata.cloud/ipfs/' + cid + ' |',
                '',
                '### Set contenthash on qryptum.eth',
                '1. https://app.ens.domains/qryptum.eth',
                '2. Edit Records -> Content Hash',
                '3. Enter: `ipfs://' + cid + '`',
                '4. Save (gas required on Ethereum mainnet)',
                '',
                'After ENS update: https://qryptum.eth.limo serves this build.',
              ].join('\n');

              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
            });
          });

          request.on('error', function(err) {
            console.error('Request error:', err.message);
            process.exit(1);
          });
          request.on('timeout', function() {
            request.destroy(new Error('Request timed out after 10 min'));
          });

          form.pipe(request);
          NODEEOF

          node /tmp/pinata-upload.cjs
