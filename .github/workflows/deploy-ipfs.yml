name: Deploy to IPFS (eth.limo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for IPFS (base path = /)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: '/'
          VITE_PROOF_SALT: ${{ secrets.VITE_PROOF_SALT }}
          VITE_SHIELD_FACTORY_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_SEPOLIA }}
          VITE_SHIELD_FACTORY_V6_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_V6_SEPOLIA }}
        run: |
          pnpm run build
          echo "=== Build output ==="
          du -sh dist/public
          find dist/public -not -name "*.map" -type f | wc -l

      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cat > /tmp/pinata-upload.mjs << 'NODEEOF'
          import fs from 'fs';
          import path from 'path';

          function getFiles(dir, base) {
            if (!base) base = dir;
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...getFiles(full, base));
              } else {
                const rel = path.relative(base, full);
                if (!rel.endsWith('.map')) results.push({ full, rel });
              }
            }
            return results;
          }

          const files = getFiles('./dist/public');
          const jwt = process.env.PINATA_JWT;
          const sha = (process.env.COMMIT_SHA || 'unknown').slice(0, 7);

          let totalBytes = 0;
          const form = new FormData();

          for (const { full, rel } of files) {
            const bytes = fs.readFileSync(full);
            totalBytes += bytes.length;
            form.append('file', new Blob([bytes]), rel);
          }

          // wrapWithDirectory: true is required when uploading multiple files.
          // The returned CID is the directory root — index.html is served at ipfs://<CID>/
          form.append('pinataMetadata', JSON.stringify({ name: 'qryptum-app-' + sha }));
          form.append('pinataOptions', JSON.stringify({ wrapWithDirectory: true }));

          console.log('Files  :', files.length, '(source maps excluded)');
          console.log('Size   :', (totalBytes / 1024 / 1024).toFixed(2), 'MB');
          console.log('Uploading to Pinata...');

          const res = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + jwt },
            body: form,
          });

          const text = await res.text();
          console.log('HTTP   :', res.status);

          let result;
          try { result = JSON.parse(text); } catch { console.error('Response:', text.slice(0, 500)); process.exit(1); }

          if (!result.IpfsHash) {
            console.error('Pinata error:', JSON.stringify(result));
            process.exit(1);
          }

          const cid = result.IpfsHash;
          console.log('');
          console.log('===== IPFS Upload Success =====');
          console.log('CID    :', cid);
          console.log('URL    : https://' + cid + '.ipfs.cf-ipfs.com');
          console.log('Pinata : https://gateway.pinata.cloud/ipfs/' + cid);
          console.log('');
          console.log('Set ENS contenthash on qryptum.eth:');
          console.log('  1. https://app.ens.domains/qryptum.eth');
          console.log('  2. Edit Records -> Content Hash');
          console.log('  3. Enter: ipfs://' + cid);
          console.log('  4. Save (ETH gas required)');
          console.log('===============================');

          const summary = [
            '## IPFS Deploy',
            '',
            '| | |',
            '|---|---|',
            '| **CID** | `' + cid + '` |',
            '| **Commit** | ' + sha + ' |',
            '| **CF Gateway** | https://' + cid + '.ipfs.cf-ipfs.com |',
            '| **Pinata Gateway** | https://gateway.pinata.cloud/ipfs/' + cid + ' |',
            '',
            '### Set contenthash on qryptum.eth',
            '1. https://app.ens.domains/qryptum.eth',
            '2. Edit Records -> Content Hash',
            '3. Enter: `ipfs://' + cid + '`',
            '4. Save (gas required on Ethereum mainnet)',
            '',
            'After ENS update: https://qryptum.eth.limo serves this build.',
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          NODEEOF

          node /tmp/pinata-upload.mjs
