name: Deploy to IPFS (eth.limo)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-ipfs:
    runs-on: ubuntu-latest
    if: github.repository == 'Qryptumorg/app'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for IPFS (base path = /)
        env:
          NODE_ENV: production
          PORT: '3000'
          BASE_PATH: '/'
          VITE_PROOF_SALT: ${{ secrets.VITE_PROOF_SALT }}
          VITE_SHIELD_FACTORY_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_SEPOLIA }}
          VITE_SHIELD_FACTORY_V6_SEPOLIA: ${{ secrets.VITE_SHIELD_FACTORY_V6_SEPOLIA }}
        run: |
          pnpm run build
          echo "=== Build size (excl .map) ==="
          du -sh dist/public

      - name: Upload to Pinata IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cat > /tmp/pinata-upload.mjs << 'NODEEOF'
          import fs from 'fs';
          import path from 'path';

          function getFiles(dir, base) {
            if (!base) base = dir;
            const out = [];
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, e.name);
              if (e.isDirectory()) out.push(...getFiles(full, base));
              else {
                const rel = path.relative(base, full);
                if (!rel.endsWith('.map')) out.push({ full, rel });
              }
            }
            return out;
          }

          const jwt = process.env.PINATA_JWT;
          const sha = (process.env.COMMIT_SHA || 'unknown').slice(0, 7);
          const folder = 'qryptum-app-' + sha;
          const entries = getFiles('./dist/public');

          let totalBytes = 0;
          const data = new FormData();

          for (const { full, rel } of entries) {
            const bytes = fs.readFileSync(full);
            totalBytes += bytes.length;
            // Exact Pinata SDK logic: path = folder + '/' + file.name
            // (webkitRelativePath is empty in Node.js environment)
            const filePath = folder + '/' + rel;
            data.append('file', new File([bytes], filePath), filePath);
          }

          // Pinata SDK uses cidVersion: 1 — NOT wrapWithDirectory
          data.append('pinataMetadata', JSON.stringify({ name: folder }));
          data.append('pinataOptions', JSON.stringify({ cidVersion: 1 }));

          console.log('Files  :', entries.length, '(source maps excluded)');
          console.log('Size   :', (totalBytes / 1024 / 1024).toFixed(2), 'MB');
          console.log('Folder :', folder);
          console.log('Uploading to Pinata legacy endpoint...');

          const res = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
            method: 'POST',
            headers: {
              Authorization: 'Bearer ' + jwt,
              Source: 'sdk/fileArray',
            },
            body: data,
          });

          const text = await res.text();
          console.log('HTTP   :', res.status);

          let result;
          try { result = JSON.parse(text); }
          catch { console.error('Bad response:', text.slice(0, 500)); process.exit(1); }

          if (!result.IpfsHash) {
            console.error('Pinata error:', JSON.stringify(result));
            process.exit(1);
          }

          // Root CID contains folder/ — subdirectory CID is what we want for ENS
          // To get the folder CID: ipfs ls <rootCID> → shows folder/ with its CID
          // For now, print rootCID and the subfolder path for ENS
          const rootCid = result.IpfsHash;
          console.log('');
          console.log('===== IPFS Upload Success =====');
          console.log('Root CID :', rootCid);
          console.log('App path : ipfs://' + rootCid + '/' + folder + '/');
          console.log('GW URL   : https://' + rootCid + '.ipfs.cf-ipfs.com/' + folder + '/');
          console.log('');
          console.log('For ENS — set contenthash to the folder sub-CID.');
          console.log('Run: ipfs ls ' + rootCid + ' (to get folder CID)');
          console.log('Or point ENS to: ipfs://' + rootCid);
          console.log('===============================');

          const summary = [
            '## IPFS Deploy',
            '',
            '| | |',
            '|---|---|',
            '| **Root CID** | `' + rootCid + '` |',
            '| **Commit** | ' + sha + ' |',
            '| **App path** | https://' + rootCid + '.ipfs.cf-ipfs.com/' + folder + '/ |',
            '',
            '### Verify upload',
            'Open: https://' + rootCid + '.ipfs.cf-ipfs.com/' + folder + '/',
            '',
            '### Set ENS contenthash',
            '> Use the gateway URL above to confirm the app loads, then:',
            '1. https://app.ens.domains/qryptum.eth',
            '2. Edit Records -> Content Hash',
            '3. Enter: `ipfs://' + rootCid + '`',
            '4. Save (gas required)',
            '',
            'Note: qryptum.eth.limo will serve ipfs://' + rootCid + '/' + folder + '/ — configure _dnslink if needed.',
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          NODEEOF

          node /tmp/pinata-upload.mjs
